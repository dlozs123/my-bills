<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>记账本</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#5b8dee;
  --primary-light:#eef3ff;
  --primary-dark:#3a6ad4;
  --danger:#ff6b6b;
  --success:#51cf66;
  --warning:#fcc419;
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#1e2d4d;
  --text2:#5a6a85;
  --text3:#a8b3c8;
  --border:#e8edf5;
  --rad:18px;
  --rad-sm:12px;
  --shadow:0 2px 12px rgba(91,141,238,0.08);
  --shadow-md:0 4px 24px rgba(91,141,238,0.12);
}
html{font-size:16px}
body{
  font-family:'Nunito','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding-bottom:76px;
  -webkit-tap-highlight-color:transparent;
}
button{font-family:inherit;cursor:pointer;touch-action:manipulation}
input,select,textarea{font-family:inherit}

/* ===== LOADING ===== */
#loading-screen{
  position:fixed;inset:0;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:9999;gap:14px;
}
.spinner{
  width:44px;height:44px;
  border:3px solid var(--border);
  border-top-color:var(--primary);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
.loading-text{font-size:14px;color:var(--text3);font-weight:600}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== TOAST ===== */
#toast{
  position:fixed;top:66px;left:50%;
  transform:translateX(-50%) translateY(-6px);
  background:rgba(30,45,77,0.92);color:white;
  padding:10px 20px;border-radius:24px;
  font-size:14px;font-weight:600;
  z-index:9998;opacity:0;
  transition:all 0.28s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none;white-space:nowrap;
  max-width:88vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== HEADER ===== */
.app-header{
  position:sticky;top:0;z-index:100;
  background:white;
  padding:14px 18px 12px;
  border-bottom:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:var(--shadow);
}
.app-header h1{font-size:19px;font-weight:800;color:var(--text);letter-spacing:-0.3px}
.header-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--success);
  display:inline-block;margin-right:6px;
}

/* ===== BOTTOM NAV ===== */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:white;
  border-top:1.5px solid var(--border);
  display:flex;
  box-shadow:0 -4px 20px rgba(91,141,238,0.08);
  z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.nav-btn{
  flex:1;border:none;background:none;
  display:flex;flex-direction:column;align-items:center;
  padding:8px 4px 10px;
  color:var(--text3);font-size:11px;font-weight:700;
  transition:color 0.2s;gap:3px;
}
.nav-icon{font-size:22px;line-height:1;transition:transform 0.2s}
.nav-btn.active{color:var(--primary)}
.nav-btn.active .nav-icon{transform:scale(1.15)}

/* ===== TAB PANES ===== */
.tab-pane{display:none;padding:14px;animation:fadeIn 0.2s ease}
.tab-pane.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ===== CARDS ===== */
.card{
  background:var(--card);
  border-radius:var(--rad);
  padding:16px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
}
.card-title{
  font-size:12px;font-weight:800;
  color:var(--text3);
  text-transform:uppercase;letter-spacing:0.8px;
  margin-bottom:14px;
}

/* ===== SEGMENT CONTROL ===== */
.seg{
  display:flex;background:var(--bg);
  border-radius:14px;padding:3px;
  margin-bottom:14px;border:1.5px solid var(--border);
}
.seg-btn{
  flex:1;border:none;border-radius:11px;
  padding:8px 4px;font-size:13px;font-weight:700;
  color:var(--text3);background:none;
  transition:all 0.2s;
}
.seg-btn.active{
  background:var(--primary);color:white;
  box-shadow:0 2px 8px rgba(91,141,238,0.3);
}

/* ===== NAV ROW ===== */
.nav-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.nav-row-label{font-size:16px;font-weight:800}
.nav-arr{
  background:var(--primary-light);border:none;
  border-radius:10px;width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:var(--primary);font-weight:700;
  transition:background 0.15s;
}
.nav-arr:active{background:var(--primary);color:white}

/* ===== OVERVIEW ===== */
.ov-total{text-align:center;padding:6px 0 14px}
.ov-total-lbl{font-size:13px;color:var(--text3);font-weight:600}
.ov-total-amt{
  font-size:40px;font-weight:800;color:var(--text);
  letter-spacing:-1px;margin:4px 0 0;
}
.chart-wrap{position:relative;height:220px;margin-top:8px}
.bar-chart-wrap{position:relative;height:190px}

.cat-item{
  display:flex;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--bg);gap:10px;
}
.cat-item:last-child{border-bottom:none}
.cat-swatch{
  width:30px;height:30px;border-radius:8px;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:16px;
}
.cat-info{flex:1;min-width:0}
.cat-name{font-size:14px;font-weight:700}
.cat-bar-bg{height:4px;background:var(--bg);border-radius:2px;margin-top:5px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:2px;transition:width 0.6s ease}
.cat-right{text-align:right;flex-shrink:0}
.cat-amt{font-size:15px;font-weight:800}
.cat-pct{font-size:11px;color:var(--text3);font-weight:600}

/* ===== FORM ===== */
.form-group{margin-bottom:13px}
.form-lbl{
  display:block;font-size:12px;font-weight:800;
  color:var(--text3);margin-bottom:6px;
  text-transform:uppercase;letter-spacing:0.5px;
}
.form-lbl .opt{font-weight:500;text-transform:none;letter-spacing:0}
.form-input,.form-select,.form-textarea{
  width:100%;padding:12px 14px;
  border:1.5px solid var(--border);border-radius:var(--rad-sm);
  font-size:16px;color:var(--text);background:white;
  -webkit-appearance:none;appearance:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{
  outline:none;border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(91,141,238,0.12);
}
.sel-wrap{position:relative}
.sel-wrap::after{
  content:'▾';position:absolute;
  right:14px;top:50%;transform:translateY(-50%);
  color:var(--text3);pointer-events:none;font-size:13px;
}
.form-textarea{resize:vertical;min-height:70px;line-height:1.5}

/* ===== BUTTONS ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:13px 18px;border:none;border-radius:var(--rad-sm);
  font-size:15px;font-weight:800;
  cursor:pointer;transition:all 0.15s;width:100%;
  letter-spacing:-0.1px;
}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--primary);color:white;box-shadow:0 4px 12px rgba(91,141,238,0.3)}
.btn-primary:active{background:var(--primary-dark)}
.btn-danger{background:var(--danger);color:white;box-shadow:0 4px 12px rgba(255,107,107,0.3)}
.btn-secondary{background:var(--bg);color:var(--text2);border:1.5px solid var(--border)}
.btn-success{background:var(--success);color:white;box-shadow:0 4px 12px rgba(81,207,102,0.3)}
.btn-outline{background:none;border:1.5px solid var(--border);color:var(--text2)}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:9px;width:auto}
.btn-xs{padding:5px 10px;font-size:12px;border-radius:7px;width:auto}

/* ===== CAT2 MGMT ===== */
.cat2-add-row{display:flex;gap:8px;margin-bottom:10px}
.cat2-add-row input{
  flex:1;padding:10px 12px;
  border:1.5px solid var(--border);border-radius:10px;
  font-size:15px;color:var(--text);
}
.cat2-add-row input:focus{outline:none;border-color:var(--primary)}
.cat2-tags{display:flex;flex-wrap:wrap;gap:7px;min-height:28px}
.cat2-tag{
  display:inline-flex;align-items:center;
  background:var(--primary-light);color:var(--primary);
  border-radius:20px;padding:5px 12px;
  font-size:13px;font-weight:700;gap:4px;
}
.cat2-del{
  background:none;border:none;
  color:var(--text3);font-size:16px;line-height:1;
  padding:0;margin-left:1px;
}
.cat2-empty{font-size:13px;color:var(--text3);padding:4px 0}

/* ===== DETAILS ===== */
.month-nav{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.month-jump{
  display:flex;align-items:center;justify-content:center;
  gap:4px;flex-wrap:wrap;
}
.month-jump input{
  width:58px;padding:7px 5px;text-align:center;
  border:1.5px solid var(--border);border-radius:8px;
  font-size:14px;font-weight:700;color:var(--text);
}
.month-jump input:focus{outline:none;border-color:var(--primary)}
.month-jump span{font-size:13px;color:var(--text3);font-weight:600}

.day-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0 7px;
  border-bottom:1.5px solid var(--border);
  margin-bottom:4px;
}
.day-hd-date{font-size:13px;font-weight:800;color:var(--text2)}
.day-hd-total{font-size:13px;font-weight:800;color:var(--primary)}

.bill-row{
  display:flex;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--bg);gap:8px;
}
.bill-row:last-child{border-bottom:none}
.bill-info{flex:1;min-width:0}
.bill-cat{font-size:14px;font-weight:700;color:var(--text2)}
.bill-cat .sub{color:var(--text3);font-weight:600}
.bill-note{font-size:12px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bill-amt{font-size:15px;font-weight:800;flex-shrink:0}
.bill-acts{display:flex;gap:5px;flex-shrink:0}

/* Edit form */
.edit-form{
  background:var(--bg);border-radius:12px;
  padding:13px;margin:6px 0;
  border:1.5px solid var(--border);
}
.edit-form .form-group{margin-bottom:9px}
.edit-form .form-input,.edit-form .form-select{padding:9px 12px;font-size:15px}
.edit-acts{display:flex;gap:8px;margin-top:6px}
.edit-acts .btn{padding:10px;font-size:13px;flex:1}

/* ===== EMPTY STATE ===== */
.empty{text-align:center;padding:36px 12px}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty p{font-size:14px;color:var(--text3);font-weight:600}

/* ===== CREDIT CARD ===== */
.cc-setting-row{
  display:flex;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--bg);gap:10px;
}
.cc-setting-row:last-child{border-bottom:none}
.cc-setting-lbl{flex:1;font-size:14px;font-weight:700;color:var(--text2)}
.cc-setting-inp{
  width:110px;padding:9px 12px;text-align:right;
  border:1.5px solid var(--border);border-radius:9px;
  font-size:15px;font-weight:800;color:var(--text);
}
.cc-setting-inp:focus{outline:none;border-color:var(--primary)}
.cc-setting-unit{font-size:13px;color:var(--text3);font-weight:600;white-space:nowrap}
.cc-info-box{
  background:var(--primary-light);border-radius:10px;
  padding:10px 13px;font-size:13px;color:var(--primary);
  font-weight:600;margin:12px 0 4px;line-height:1.5;
}

.pending-item{
  display:flex;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--bg);gap:8px;
}
.pending-item:last-child{border-bottom:none}
.pending-info{flex:1;min-width:0}
.pending-cat{font-size:14px;font-weight:700;color:var(--text2)}
.pending-sub{font-size:12px;color:var(--text3);margin-top:2px}
.pending-amt{font-size:15px;font-weight:800;flex-shrink:0}
.cc-total-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 0 6px;
  border-top:2px solid var(--border);
  margin-top:6px;
}
.cc-total-lbl{font-size:14px;font-weight:800;color:var(--text2)}
.cc-total-val{font-size:20px;font-weight:800;color:var(--primary)}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(20,30,60,0.5);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:500;opacity:0;
  transition:opacity 0.25s;pointer-events:none;
}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-sheet{
  background:white;width:100%;max-width:490px;
  border-radius:24px 24px 0 0;
  padding:20px 20px calc(28px + env(safe-area-inset-bottom,0));
  transform:translateY(16px);
  transition:transform 0.28s cubic-bezier(0.34,1.2,0.64,1);
  max-height:78vh;overflow-y:auto;
}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-handle{
  width:38px;height:4px;background:var(--border);
  border-radius:2px;margin:0 auto 16px;
}
.modal-title{font-size:18px;font-weight:800;margin-bottom:10px}
.modal-body{font-size:14px;color:var(--text2);line-height:1.65;margin-bottom:14px}
.change-row{
  padding:5px 0;
  border-bottom:1px solid var(--bg);
}
.change-row:last-child{border-bottom:none}
.change-row strong{color:var(--text);font-weight:800}
.modal-acts{display:flex;flex-direction:column;gap:9px}

.cat2-list{margin-top:7px;display:flex;flex-direction:column;gap:3px}
.cat2-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:3px 0 3px 8px;
  border-left:2px solid var(--border);
  gap:6px;
}
.cat2-row-name{font-size:12px;color:var(--text3);font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat2-row-amt{font-size:12px;font-weight:800;color:var(--text2);flex-shrink:0}

/* ===== BUDGET ===== */
.budget-bar-wrap{padding:0 2px 12px}
.budget-bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.budget-bar-lbl{font-size:12px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px}
.budget-bar-pct{font-size:13px;font-weight:800;color:var(--text2)}
.budget-track{height:13px;background:var(--bg);border-radius:7px;overflow:hidden;border:1.5px solid var(--border);display:flex}
.budget-used{background:var(--danger);transition:width 0.5s ease;border-radius:6px 0 0 6px}
.budget-used.full{border-radius:6px}
.budget-rem{background:var(--success);transition:width 0.5s ease;border-radius:0 6px 6px 0}
.budget-labels{display:flex;justify-content:space-between;margin-top:5px}
.budget-lbl-used{font-size:11px;color:var(--danger);font-weight:700}
.budget-lbl-rem{font-size:11px;color:var(--success);font-weight:700}
.budget-alert{
  background:#fff0f0;border:1.5px solid var(--danger);
  color:#c0392b;border-radius:var(--rad-sm);
  padding:11px 14px;font-size:13px;font-weight:800;
  margin-bottom:12px;line-height:1.5;
}
.budget-warn{
  background:#fffbe6;border:1.5px solid var(--warning);
  border-radius:var(--rad-sm);
  padding:12px 14px;margin-top:12px;
  font-size:13px;color:#7d5a00;font-weight:700;line-height:1.65;
}
.binfo-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--bg);
}
.binfo-row:last-child{border-bottom:none}
.binfo-lbl{font-size:13px;color:var(--text2);font-weight:600}
.binfo-val{font-size:14px;font-weight:800;text-align:right}
.binfo-val.danger{color:var(--danger)}
.binfo-val.success{color:var(--success)}
.binfo-val.warn{color:#c8860a}
.budget-set-row{display:flex;align-items:center;gap:8px}
.budget-set-row input{flex:1}
.budget-set-unit{font-size:13px;color:var(--text3);font-weight:700;white-space:nowrap;flex-shrink:0}
.budget-cur{font-size:13px;color:var(--text3);font-weight:600;margin-top:9px;padding-top:9px;border-top:1px solid var(--bg)}

/* ===== BALANCE TAB ===== */
.bal-item{
  display:flex;align-items:center;
  padding:13px 0;border-bottom:1px solid var(--bg);gap:12px;
}
.bal-item:last-child{border-bottom:none}
.bal-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.bal-info{flex:1}
.bal-name{font-size:14px;font-weight:700}
.bal-type-lbl{font-size:11px;color:var(--text3);font-weight:600;margin-top:2px}
.bal-amt{font-size:17px;font-weight:800;flex-shrink:0}
.bal-amt.neg{color:var(--danger)}
.calib-row{
  display:flex;align-items:center;gap:8px;
  padding:9px 0;border-bottom:1px solid var(--bg);
}
.calib-row:last-child{border-bottom:none}
.calib-name{flex:1;font-size:14px;font-weight:700;color:var(--text2)}
.calib-inp{
  width:120px;padding:8px 12px;text-align:right;
  border:1.5px solid var(--border);border-radius:9px;
  font-size:15px;font-weight:800;color:var(--text);
}
.calib-inp:focus{outline:none;border-color:var(--primary)}
.calib-rec{border-bottom:1px solid var(--bg);padding:11px 0}
.calib-rec:last-child{border-bottom:none}
.calib-rec-hd{
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.calib-rec-date{font-size:14px;font-weight:800;color:var(--text2)}
.calib-toggle{font-size:12px;color:var(--primary);font-weight:700;padding:2px 8px;background:var(--primary-light);border-radius:6px}
.calib-rec-body{display:none;margin-top:9px}
.calib-rec-body.open{display:block}
.calib-snap{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.calib-snap-lbl{color:var(--text2);font-weight:700}
.calib-snap-val{color:var(--text3);font-weight:600}
.calib-snap-val strong{color:var(--primary);font-weight:800}
.calib-rec-del{margin-top:8px;display:flex;justify-content:flex-end}
.bal-source-tag{
  display:inline-block;font-size:11px;font-weight:700;
  padding:2px 7px;border-radius:5px;margin-top:3px;
  background:var(--primary-light);color:var(--primary);
}
.bal-source-tag.pending{background:#fff3cd;color:#856404}
/* Bank badge */
.bank-badge{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:900;flex-shrink:0;
  color:white;letter-spacing:0;
}
/* Booked toggle */
.booked-toggle{display:flex;gap:0;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:0}
.booked-btn{
  flex:1;border:none;padding:10px 6px;font-size:13px;font-weight:700;
  background:var(--bg);color:var(--text3);cursor:pointer;transition:all 0.15s;
}
.booked-btn.active{background:var(--primary);color:white}
/* Unbooked section */
.unbooked-card{
  background:#fffbe6;border:1.5px solid var(--warning);
  border-radius:var(--rad);padding:14px;margin-bottom:12px;
}
.unbooked-title{
  font-size:12px;font-weight:800;color:#92600a;
  text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;
}
.unbooked-item{
  display:flex;align-items:center;
  padding:9px 0;border-bottom:1px solid rgba(252,196,25,0.3);gap:8px;
}
.unbooked-item:last-child{border-bottom:none}
.unbooked-info{flex:1;min-width:0}
.unbooked-cat{font-size:14px;font-weight:700;color:var(--text2)}
.unbooked-meta{font-size:12px;color:var(--text3);margin-top:2px}

/* ===== DIVIDER ===== */

<script>
// ════════════════════════════════════════
//  INIT (config loaded from config.json)
// ════════════════════════════════════════
const { createClient } = supabase;
let db;

/*
 ═══════════════════════════════════════════════════
  Supabase 建表说明（五张表）
 ═══════════════════════════════════════════════════

 【Table: bills】
   id             uuid        PK, default gen_random_uuid()
   date           date        NOT NULL
   category1      text        NOT NULL
   category2      text        nullable
   amount         numeric     NOT NULL
   notes          text        nullable
   status         text        NOT NULL, default 'regular'
                              ('regular'=普通  'credit_pending'=信用卡待还)
   created_at     timestamptz default now()

 【Table: categories】
   id             uuid        PK, default gen_random_uuid()
   category1      text        NOT NULL
   name           text        NOT NULL
   created_at     timestamptz default now()

 【Table: credit_config】
   id                uuid        PK, default gen_random_uuid()
   monthly_amount    numeric     NOT NULL, default 0
   remaining_months  int4        NOT NULL, default 0
   last_billed_month text        nullable   (格式: YYYY-MM)
   created_at        timestamptz default now()

 【Table: budget_config】（新增）
   id                   uuid   PK, default gen_random_uuid()
   monthly_budget       numeric NOT NULL, default 0
   last_processed_month text    nullable   (格式: YYYY-MM)
   created_at           timestamptz default now()

 【Table: budget_history】（新增）
   id                uuid   PK, default gen_random_uuid()
   year_month        text   NOT NULL, UNIQUE
   monthly_budget    numeric NOT NULL, default 0
   installment_amount numeric NOT NULL, default 0
   other_expenses    numeric NOT NULL, default 0
   dining_expenses   numeric NOT NULL, default 0
   dining_budget     numeric NOT NULL, default 0
   created_at        timestamptz default now()
   注意：year_month 需加 UNIQUE 约束（Table Editor → 列设置 → Unique）

 【Table: balances】（新增）
   id          uuid    PK, default gen_random_uuid()
   name        text    NOT NULL
   type        text    NOT NULL  ('wechat' | 'alipay' | 'bank')
   amount      numeric NOT NULL, default 0
   sort_order  int4    NOT NULL, default 0
   created_at  timestamptz default now()

 【Table: calibrations】（新增）
   id               uuid  PK, default gen_random_uuid()
   calibration_date date  NOT NULL
   snapshots        text  NOT NULL  (JSON array)
   created_at       timestamptz default now()

 bills 表新增两列：
   source_id    uuid  nullable
   source_name  text  nullable

 安全: 关闭 RLS 或为七张表都添加 Allow All 策略
 Realtime: 在 Supabase → Database → Replication 中启用 bills 和 categories 表
 ═══════════════════════════════════════════════════
*/

// ════════════════════════════════════════
//  CONSTANTS & STATE
// ════════════════════════════════════════
const CAT1 = ['餐饮','购物','充值','其他'];
const CAT_EMOJI = {'餐饮':'🍜','购物':'🛍️','充值':'💳','其他':'📦'};
const CAT_COLOR = {'餐饮':'#ff6b6b','购物':'#51cf66','充值':'#339af0','其他':'#fcc419'};
const CAT_BG    = {'餐饮':'#fff0f0','购物':'#ebfbee','充值':'#e7f5ff','其他':'#fff9db'};

let bills = [], cats = [], ccConfig = null;
let budgetConfig = null, budgetHistory = [];
let balances = [], calibrations = [];
let ovPeriod = 'month', ovDate = new Date();
let detMonth = new Date();
let detFilter = {cat1:'', cat2:''}; // '' = 全部
let editingId = null, editOrig = null, pendingEdit = null;
let deletingId = null;
let pieInst = null, barInst = null;
let curTab = 'overview';

// ════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════
// 始终返回北京时间（UTC+8）的日期字符串 YYYY-MM-DD
function todayStr(){
  const bj = new Date(Date.now() + 8*60*60*1000);
  return bj.toISOString().split('T')[0];
}

function fmt(n){ return '¥' + parseFloat(n||0).toFixed(2); }

function fmtMonth(d){ return `${d.getFullYear()}年${d.getMonth()+1}月`; }

function fmtDay(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  const w = ['日','一','二','三','四','五','六'];
  return `${d.getMonth()+1}月${d.getDate()}日 周${w[d.getDay()]}`;
}

function toYM(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }

function esc(s){ 
  if(!s) return ''; 
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); 
}

let _toastTimer;
function toast(msg, ms=2200){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>el.classList.remove('show'), ms);
}

function showModal(id){ document.getElementById(id).classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }

// ════════════════════════════════════════
//  DATA LOADING
// ════════════════════════════════════════
async function loadAll(){
  await Promise.all([loadBills(), loadCats(), loadCC(), loadBudgetConfig(), loadBudgetHistory(), loadBalances(), loadCalibrations()]);
}

async function loadBills(){
  const {data,error} = await db.from('bills').select('*')
    .order('date',{ascending:false})
    .order('created_at',{ascending:true});
  if(error){ console.error(error); return; }
  bills = data || [];
}

async function loadCats(){
  const {data,error} = await db.from('categories').select('*')
    .order('created_at',{ascending:true});
  if(error){ console.error(error); return; }
  cats = data || [];
}

async function loadCC(){
  const {data,error} = await db.from('credit_config').select('*').limit(1);
  if(error){ console.error(error); return; }
  if(data && data.length > 0){
    ccConfig = data[0];
  } else {
    const {data:nd, error:e2} = await db.from('credit_config').insert({
      monthly_amount:0, remaining_months:0, last_billed_month:''
    }).select().single();
    if(!e2) ccConfig = nd;
  }
}

async function loadBudgetConfig(){
  const {data,error} = await db.from('budget_config').select('*').limit(1);
  if(error){ console.error(error); return; }
  if(data && data.length > 0){
    budgetConfig = data[0];
  } else {
    const {data:nd,error:e2} = await db.from('budget_config').insert({
      monthly_budget:0, last_processed_month:null
    }).select().single();
    if(!e2) budgetConfig = nd;
  }
}

async function loadBudgetHistory(){
  const {data,error} = await db.from('budget_history').select('*')
    .order('year_month',{ascending:false});
  if(error){ console.error(error); return; }
  budgetHistory = data || [];
}

async function loadBalances(){
  const {data,error} = await db.from('balances').select('*')
    .order('sort_order',{ascending:true}).order('created_at',{ascending:true});
  if(error){ console.error(error); return; }
  if(!data || data.length===0){
    const {data:nd,error:e2} = await db.from('balances').insert([
      {name:'微信',type:'wechat',amount:0,sort_order:0},
      {name:'支付宝',type:'alipay',amount:0,sort_order:1}
    ]).select();
    if(!e2) balances = nd||[];
  } else {
    balances = data;
  }
}

async function loadCalibrations(){
  const {data,error} = await db.from('calibrations').select('*')
    .order('calibration_date',{ascending:false})
    .order('created_at',{ascending:false});
  if(error){ console.error(error); return; }
  calibrations = data||[];
}

// 北京时间 08:00 之前校准 → 当天账单参与扣减（effectiveFrom = 校准的北京日期）
// 北京时间 08:00 及之后校准 → 次日起才扣减
function getCalibEffectiveFrom(){
  if(!calibrations.length) return null;
  const c = calibrations[0];
  const utcMs  = new Date(c.created_at).getTime();
  const bjDate = new Date(utcMs + 8*60*60*1000);
  // 从 created_at 反推北京日期，避免 calibration_date 列存的是 UTC 日期的问题
  const bjDateStr = bjDate.toISOString().split('T')[0];
  const bjHour = bjDate.getUTCHours();
  if(bjHour < 8){
    return bjDateStr;
  } else {
    const next = new Date(bjDate.getTime() + 24*60*60*1000);
    return next.toISOString().split('T')[0];
  }
}

function isAfterCalib(dateStr){
  const from = getCalibEffectiveFrom();
  return from ? dateStr >= from : false;
}

// ════════════════════════════════════════
//  BUDGET LOGIC
// ════════════════════════════════════════

// Calculate live budget stats for the current month
function calcBudget(){
  if(!budgetConfig || !budgetConfig.monthly_budget || budgetConfig.monthly_budget <= 0) return null;
  const now = new Date();
  const curYM = toYM(now);
  const today = now.getDate();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const mb = parseFloat(budgetConfig.monthly_budget);
  const installAmt = ccConfig?.monthly_amount ? parseFloat(ccConfig.monthly_amount) : 0;

  const curBills = bills.filter(b => b.status==='regular' && b.date.startsWith(curYM));
  // 排除「信用卡分期」账单，因为 installAmt 已代表该承诺支出，避免双计
  const expBills = curBills.filter(b => b.category2 !== '信用卡分期');
  const totalExpenses     = expBills.reduce((s,b)=>s+parseFloat(b.amount),0);
  const diningExpenses    = expBills.filter(b=>b.category1==='餐饮').reduce((s,b)=>s+parseFloat(b.amount),0);
  const nonDiningExpenses = expBills.filter(b=>b.category1!=='餐饮').reduce((s,b)=>s+parseFloat(b.amount),0);

  // Remaining budget after installment + non-dining (floor 0)
  const totalDiningBudget = Math.max(0, mb - installAmt - nonDiningExpenses);
  // Proportional dining budget up to today
  const diningBudgetToday = totalDiningBudget / daysInMonth * today;
  const remainingDiningBudget = totalDiningBudget - diningExpenses;
  const remainingDays = daysInMonth - today;
  const dailyRemainingDining = remainingDays > 0 ? remainingDiningBudget / remainingDays : 0;

  // effectiveUsed = installment (committed on 1st) + all actual bills
  const effectiveUsed = installAmt + totalExpenses;
  return {
    mb, installAmt, totalExpenses, diningExpenses, nonDiningExpenses,
    effectiveUsed,
    totalDiningBudget, diningBudgetToday, remainingDiningBudget,
    dailyRemainingDining, daysInMonth, today, remainingDays,
    diningOverAmount: diningExpenses - diningBudgetToday,
    totalOverAmount: effectiveUsed - mb,
    isTotalOver: effectiveUsed >= mb,
    isDiningOver: diningExpenses > diningBudgetToday,
    isHistorical: false
  };
}

// Save month stats to budget_history
async function saveMonthStats(ym){
  if(!budgetConfig || !budgetConfig.monthly_budget) return;
  const mb = parseFloat(budgetConfig.monthly_budget);
  const installAmt = ccConfig?.monthly_amount ? parseFloat(ccConfig.monthly_amount) : 0;
  const monthBills = bills.filter(b=>b.status==='regular' && b.date.startsWith(ym));
  // 同样排除「信用卡分期」账单，避免和 installAmt 双计
  const expBills  = monthBills.filter(b=>b.category2 !== '信用卡分期');
  const nonDining = expBills.filter(b=>b.category1!=='餐饮').reduce((s,b)=>s+parseFloat(b.amount),0);
  const dining    = expBills.filter(b=>b.category1==='餐饮').reduce((s,b)=>s+parseFloat(b.amount),0);
  const diningBudget = Math.max(0, mb - installAmt - nonDining);
  const payload = {
    year_month:ym, monthly_budget:mb, installment_amount:installAmt,
    other_expenses:nonDining, dining_expenses:dining, dining_budget:diningBudget
  };
  const exists = budgetHistory.find(h=>h.year_month===ym);
  if(exists){
    await db.from('budget_history').update(payload).eq('year_month',ym);
  } else {
    await db.from('budget_history').insert(payload);
  }
}

// Check if month-start processing is needed (runs on each app open)
async function checkMonthlyReset(){
  if(!budgetConfig) return;
  const curYM = toYM(new Date());
  if(budgetConfig.last_processed_month === curYM) return;

  const prev = budgetConfig.last_processed_month;
  if(prev && prev < curYM){
    // Save stats for all months between prev+1 and curYM-1
    let d = new Date(prev+'-01T00:00:00');
    d.setMonth(d.getMonth()+1);
    while(toYM(d) < curYM){
      await saveMonthStats(toYM(d));
      d.setMonth(d.getMonth()+1);
    }
    await loadBudgetHistory();
    toast('📊 已重置本月预算，上月记录已保存');
  } else if(!prev){
    toast('📊 预算已启动，请在记入页设置月预算');
  }
  await db.from('budget_config').update({last_processed_month:curYM}).eq('id',budgetConfig.id);
  budgetConfig.last_processed_month = curYM;
}

async function checkAutoInstallment(){
  if(!ccConfig) return;
  if(!ccConfig.monthly_amount || ccConfig.monthly_amount <= 0) return;
  if(!ccConfig.remaining_months || ccConfig.remaining_months <= 0) return;
  const now = new Date();
  if(now.getDate() < 18) return;
  const curYM = toYM(now);
  if(ccConfig.last_billed_month === curYM) return;

  const {error} = await db.from('bills').insert({
    date: todayStr(),
    category1:'其他', category2:'信用卡分期',
    amount: ccConfig.monthly_amount,
    notes:'分期还款（自动出账）',
    status:'credit_pending'
  });
  if(error){ console.error('Auto installment:', error); return; }

  await db.from('credit_config')
    .update({last_billed_month: curYM}).eq('id', ccConfig.id);
  ccConfig.last_billed_month = curYM;
  await loadBills();
  toast('📅 已自动添加本月分期至待还款');
}

function getOvBills(){
  return bills.filter(b=>{
    if(b.status!=='regular') return false;
    const d = new Date(b.date+'T00:00:00');
    if(ovPeriod==='day')
      return d.getFullYear()===ovDate.getFullYear()&&d.getMonth()===ovDate.getMonth()&&d.getDate()===ovDate.getDate();
    if(ovPeriod==='month')
      return d.getFullYear()===ovDate.getFullYear()&&d.getMonth()===ovDate.getMonth();
    return d.getFullYear()===ovDate.getFullYear();
  });
}

function renderOverview(){
  // Label
  let lbl = '';
  if(ovPeriod==='day'){
    const w=['日','一','二','三','四','五','六'];
    lbl = `${ovDate.getMonth()+1}月${ovDate.getDate()}日 周${w[ovDate.getDay()]}`;
  } else if(ovPeriod==='month'){
    lbl = `${ovDate.getFullYear()}年${ovDate.getMonth()+1}月`;
  } else {
    lbl = `${ovDate.getFullYear()}年`;
  }
  document.getElementById('ov-label').textContent = lbl;

  const filtered = getOvBills();
  const total = filtered.reduce((s,b)=>s+parseFloat(b.amount),0);
  document.getElementById('ov-total').textContent = fmt(total);

  // Cat totals
  const ct = {};
  CAT1.forEach(c=>ct[c]=0);
  filtered.forEach(b=>{ if(ct[b.category1]!==undefined) ct[b.category1]+=parseFloat(b.amount); });

  // Pie
  renderPie(ct, total);

  // Cat list
  const el = document.getElementById('ov-cats');
  el.innerHTML = '';
  const hasData = filtered.length > 0;
  if(!hasData){
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>暂无消费记录</p></div>';
  } else {
    // Build cat2 totals per cat1
    const ct2 = {};
    CAT1.forEach(c=>{ ct2[c]={}; });
    filtered.forEach(b=>{
      const k = b.category2||'(未分类)';
      if(!ct2[b.category1]) ct2[b.category1]={};
      ct2[b.category1][k] = (ct2[b.category1][k]||0) + parseFloat(b.amount);
    });

    CAT1.forEach(cat=>{
      if(ct[cat]===0) return;
      const pct = total>0?(ct[cat]/total*100):0;

      // Sub-category rows html
      const sub2 = ct2[cat]||{};
      const sub2entries = Object.entries(sub2).sort((a,b)=>b[1]-a[1]);
      const sub2html = sub2entries.length > 0
        ? `<div class="cat2-list">${sub2entries.map(([name,amt])=>
            `<div class="cat2-row">
              <span class="cat2-row-name" style="cursor:pointer" onclick="jumpToDetailFilter('${esc(cat)}','${esc(name)}')">${esc(name)}</span>
              <span class="cat2-row-amt">${fmt(amt)}</span>
            </div>`).join('')}</div>`
        : '';

      const d = document.createElement('div');
      d.className = 'cat-item';
      d.innerHTML = `
        <div class="cat-swatch" style="background:${CAT_BG[cat]}">${CAT_EMOJI[cat]}</div>
        <div class="cat-info">
          <div class="cat-name" style="cursor:pointer" onclick="jumpToDetailFilter('${esc(cat)}','')">${cat}</div>
          <div class="cat-bar-bg">
            <div class="cat-bar-fill" style="width:${pct.toFixed(1)}%;background:${CAT_COLOR[cat]}"></div>
          </div>
          ${sub2html}
        </div>
        <div class="cat-right">
          <div class="cat-amt">${fmt(ct[cat])}</div>
          <div class="cat-pct">${pct.toFixed(1)}%</div>
        </div>`;
      el.appendChild(d);
    });
  }

  // Bar chart
  const barCard = document.getElementById('bar-card');
  if(ovPeriod==='day'){
    barCard.style.display = 'none';
  } else {
    barCard.style.display = 'block';
    renderBar(filtered);
  }

  // Budget bar (month view only)
  renderBudgetBar();
}

function renderBudgetBar(){
  const wrap  = document.getElementById('budget-bar-wrap');
  const alert = document.getElementById('budget-alert');
  alert.style.display = 'none';
  wrap.style.display  = 'none';

  if(ovPeriod !== 'month') return;

  // Determine which month we're viewing
  const viewYM = toYM(ovDate);
  const curYM  = toYM(new Date());
  let stats = null;

  if(viewYM === curYM){
    stats = calcBudget();
  } else {
    const hist = budgetHistory.find(h=>h.year_month===viewYM);
    if(hist){
      const totalExp = parseFloat(hist.dining_expenses) + parseFloat(hist.other_expenses);
      stats = {
        mb: parseFloat(hist.monthly_budget),
        totalExpenses: totalExp,
        diningExpenses: parseFloat(hist.dining_expenses),
        nonDiningExpenses: parseFloat(hist.other_expenses),
        totalDiningBudget: parseFloat(hist.dining_budget),
        diningBudgetToday: parseFloat(hist.dining_budget),
        remainingDiningBudget: parseFloat(hist.dining_budget)-parseFloat(hist.dining_expenses),
        diningOverAmount: parseFloat(hist.dining_expenses)-parseFloat(hist.dining_budget),
        totalOverAmount: totalExp - parseFloat(hist.monthly_budget),
        isTotalOver: totalExp >= parseFloat(hist.monthly_budget),
        isDiningOver: parseFloat(hist.dining_expenses) > parseFloat(hist.dining_budget),
        isHistorical: true
      };
    }
  }

  if(!stats || stats.mb <= 0) return;

  const usedAmt = stats.isHistorical ? stats.totalExpenses : stats.effectiveUsed;
  const usedPct = Math.min(100, usedAmt / stats.mb * 100);
  const remPct  = Math.max(0, 100 - usedPct);

  wrap.style.display = 'block';
  document.getElementById('bbar-pct').textContent = usedPct.toFixed(1)+'%';
  const usedEl = document.getElementById('bbar-used');
  const remEl  = document.getElementById('bbar-rem');
  usedEl.style.width = usedPct+'%';
  usedEl.classList.toggle('full', remPct===0);
  remEl.style.width = remPct+'%';
  document.getElementById('bbar-used-lbl').textContent = `已用 ${fmt(usedAmt)}`;
  document.getElementById('bbar-rem-lbl').textContent  = stats.isTotalOver
    ? `超出 ${fmt(Math.abs(stats.totalOverAmount))}`
    : `剩余 ${fmt(stats.mb - usedAmt)}`;

  if(stats.isTotalOver){
    alert.style.display = 'block';
    alert.textContent = `⚠️ 本月预算已全部用完！合计超出 ${fmt(Math.abs(stats.totalOverAmount))}`;
  }
}

function renderPie(ct, total){
  const canvas = document.getElementById('pie-chart');
  if(pieInst){ pieInst.destroy(); pieInst=null; }
  const lbls = CAT1.filter(c=>ct[c]>0);
  const data = lbls.map(c=>ct[c]);
  const colors = lbls.map(c=>CAT_COLOR[c]);
  if(lbls.length===0) return;

  pieInst = new Chart(canvas.getContext('2d'),{
    type:'doughnut',
    data:{ labels:lbls, datasets:[{ data, backgroundColor:colors, borderWidth:3, borderColor:'#fff' }] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{ position:'bottom', labels:{ padding:14, font:{size:13,weight:'700'}, boxWidth:12, boxHeight:12 } },
        tooltip:{ callbacks:{ label:ctx=>`${ctx.label}: ${fmt(ctx.parsed)}` } }
      },
      cutout:'62%',
    }
  });
}

function renderBar(filtered){
  const canvas = document.getElementById('bar-chart');
  const titleEl = document.getElementById('bar-title');
  if(barInst){ barInst.destroy(); barInst=null; }

  let labels=[], data=[];
  if(ovPeriod==='month'){
    titleEl.textContent = '每日支出';
    const days = new Date(ovDate.getFullYear(), ovDate.getMonth()+1, 0).getDate();
    const dt = {};
    for(let i=1;i<=days;i++) dt[i]=0;
    filtered.forEach(b=>{ const dy=new Date(b.date+'T00:00:00').getDate(); dt[dy]=(dt[dy]||0)+parseFloat(b.amount); });
    labels = Object.keys(dt).map(d=>d+'日');
    data = Object.values(dt);
  } else {
    titleEl.textContent = '每月支出';
    const mt={};
    for(let i=1;i<=12;i++) mt[i]=0;
    filtered.forEach(b=>{ const m=new Date(b.date+'T00:00:00').getMonth()+1; mt[m]=(mt[m]||0)+parseFloat(b.amount); });
    labels = Object.keys(mt).map(m=>m+'月');
    data = Object.values(mt);
  }

  barInst = new Chart(canvas.getContext('2d'),{
    type:'bar',
    data:{ labels, datasets:[{ data, backgroundColor:'rgba(91,141,238,0.75)', borderRadius:6, borderSkipped:false }] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:ctx=>fmt(ctx.parsed.y) } } },
      scales:{
        x:{ grid:{display:false}, ticks:{ font:{size:10,weight:'700'}, maxRotation:0 } },
        y:{ grid:{color:'#f0f2f8'}, ticks:{ font:{size:11}, callback:v=>'¥'+v, maxTicksLimit:5 } }
      }
    }
  });
}

async function submitEntry(){
  const date   = document.getElementById('e-date').value;
  const cat1   = document.getElementById('e-cat1').value;
  const cat2   = document.getElementById('e-cat2').value;
  const amount = parseFloat(document.getElementById('e-amount').value);
  const notes  = document.getElementById('e-notes').value.trim();
  if(!date){ toast('请选择日期'); return; }
  if(isNaN(amount)||amount<=0){ toast('请输入有效金额'); return; }
  try{
    await insertBill({date, category1:cat1, category2:cat2||null, amount,
      notes:notes||null, status:'regular'});
    document.getElementById('e-amount').value='';
    document.getElementById('e-notes').value='';
    const curYM = toYM(new Date());
    const warnEl = document.getElementById('entry-budget-warn');
    warnEl.style.display='none';
    if(date.startsWith(curYM)){
      const stats = calcBudget();
      if(stats && stats.mb > 0){
        if(stats.isTotalOver){ toast('✅ 已记入'); }
        else if(stats.isDiningOver){
          const daily = stats.dailyRemainingDining;
          const dailyStr = daily>=0 ? `每日可用 ${fmt(daily)}` : `每日已超 ${fmt(Math.abs(daily))}`;
          warnEl.innerHTML=`⚠️ 餐饮预算已超标！<br>截至今日已超出 <strong>${fmt(stats.diningOverAmount)}</strong><br>本月剩余 ${stats.remainingDays} 天，${dailyStr}`;
          warnEl.style.display='block';
        } else { toast('✅ 记入成功！'); }
        if(curTab==='entry') renderBudgetBar();
      } else { toast('✅ 记入成功！'); }
    } else { toast('✅ 记入成功！'); }
  } catch(e){ toast('记入失败：'+e.message); }
}

function buildFilterOptions(){
  // Build options from all bills: all cat1 and cat2 values
  const sel = document.getElementById('det-filter-sel');
  if(!sel) return;
  const curVal = detFilter.cat2
    ? `cat2:${detFilter.cat1}:${detFilter.cat2}`
    : detFilter.cat1 ? `cat1:${detFilter.cat1}` : '';
  sel.innerHTML = '<option value="">全部分类</option>';
  // Collect cat2 per cat1 from ALL bills (not just current month, for consistent options)
  const tree = {};
  bills.filter(b=>b.status==='regular').forEach(b=>{
    if(!tree[b.category1]) tree[b.category1]=new Set();
    if(b.category2) tree[b.category1].add(b.category2);
  });
  CAT1.forEach(c1=>{
    if(!tree[c1]) return;
    const og = document.createElement('option');
    og.value = `cat1:${c1}`; og.textContent = `${CAT_EMOJI[c1]} ${c1}`;
    if(`cat1:${c1}`===curVal) og.selected=true;
    sel.appendChild(og);
    const sub2 = Array.from(tree[c1]).sort();
    sub2.forEach(c2=>{
      const o = document.createElement('option');
      o.value = `cat2:${c1}:${c2}`; o.textContent = `　↳ ${c2}`;
      if(`cat2:${c1}:${c2}`===curVal) o.selected=true;
      sel.appendChild(o);
    });
  });
}

function onDetFilterChange(){
  const val = document.getElementById('det-filter-sel').value;
  if(!val){ detFilter={cat1:'',cat2:''}; }
  else if(val.startsWith('cat2:')){
    const parts = val.split(':');
    detFilter={cat1:parts[1], cat2:parts[2]};
  } else {
    detFilter={cat1:val.replace('cat1:',''), cat2:''};
  }
  renderDetails();
}

function renderDetails(){
  document.getElementById('det-label').textContent = fmtMonth(detMonth);
  document.getElementById('j-year').value = detMonth.getFullYear();
  document.getElementById('j-month').value = detMonth.getMonth()+1;

  buildFilterOptions();

  // Render budget card for this month
  renderDetBudget();

  const yr = detMonth.getFullYear(), mo = detMonth.getMonth();
  let mbills = bills.filter(b=>{
    if(b.status!=='regular') return false;
    const d = new Date(b.date+'T00:00:00');
    return d.getFullYear()===yr && d.getMonth()===mo;
  });

  // Apply filter
  if(detFilter.cat2){
    mbills = mbills.filter(b=>b.category1===detFilter.cat1 && b.category2===detFilter.cat2);
  } else if(detFilter.cat1){
    mbills = mbills.filter(b=>b.category1===detFilter.cat1);
  }

  // Sort: date desc, then cat1, cat2
  mbills.sort((a,b)=>{
    if(a.date!==b.date) return b.date.localeCompare(a.date);
    if(a.category1!==b.category1) return a.category1.localeCompare(b.category1);
    return (a.category2||'').localeCompare(b.category2||'');
  });

  // Group by date
  const groups = {};
  mbills.forEach(b=>{ if(!groups[b.date]) groups[b.date]=[]; groups[b.date].push(b); });

  const container = document.getElementById('det-list');
  container.innerHTML = '';

  if(mbills.length===0){
    const empty = document.createElement('div');
    empty.className = 'card';
    const emptyMsg = (detFilter.cat1||detFilter.cat2) ? '该分类本月暂无消费记录' : '本月暂无消费记录';
    empty.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>${emptyMsg}</p></div>`;
    container.appendChild(empty);
    return;
  }

  const dates = Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  dates.forEach(date=>{
    const dayBills = groups[date];
    const dayTotal = dayBills.reduce((s,b)=>s+parseFloat(b.amount),0);
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="day-hd">
      <span class="day-hd-date">${fmtDay(date)}</span>
      <span class="day-hd-total">${fmt(dayTotal)}</span>
    </div>`;
    dayBills.forEach(bill=>{
      if(editingId===bill.id) card.appendChild(makeEditForm(bill));
      else card.appendChild(makeBillRow(bill));
    });
    container.appendChild(card);
  });
}

function renderDetBudget(){
  const card    = document.getElementById('det-budget-card');
  const content = document.getElementById('det-budget-content');
  const viewYM  = toYM(detMonth);
  const curYM   = toYM(new Date());

  let stats = null;
  if(viewYM === curYM){
    stats = calcBudget();
  } else {
    const hist = budgetHistory.find(h=>h.year_month===viewYM);
    if(hist){
      const totalExp = parseFloat(hist.dining_expenses)+parseFloat(hist.other_expenses);
      const instAmt  = parseFloat(hist.installment_amount);
      const effUsed  = instAmt + totalExp;
      stats = {
        mb: parseFloat(hist.monthly_budget),
        installAmt: instAmt,
        totalExpenses: totalExp,
        effectiveUsed: effUsed,
        diningExpenses: parseFloat(hist.dining_expenses),
        nonDiningExpenses: parseFloat(hist.other_expenses),
        totalDiningBudget: parseFloat(hist.dining_budget),
        diningBudgetToday: parseFloat(hist.dining_budget),
        remainingDiningBudget: parseFloat(hist.dining_budget)-parseFloat(hist.dining_expenses),
        isTotalOver: effUsed >= parseFloat(hist.monthly_budget),
        isDiningOver: parseFloat(hist.dining_expenses) > parseFloat(hist.dining_budget),
        totalOverAmount: effUsed - parseFloat(hist.monthly_budget),
        isHistorical: true
      };
    }
  }

  if(!stats || stats.mb <= 0){
    card.style.display = 'none'; return;
  }
  card.style.display = 'block';

  const now = new Date();
  const isCur = viewYM === curYM;
  const todayDay = now.getDate();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const diningDiff = stats.diningExpenses - stats.diningBudgetToday;
  const totalDiff  = stats.totalExpenses  - stats.mb;

  const row = (lbl, val, cls='') =>
    `<div class="binfo-row"><span class="binfo-lbl">${lbl}</span><span class="binfo-val ${cls}">${val}</span></div>`;

  let html = row('月预算', fmt(stats.mb));
  html += row('信用卡分期（已承诺）', fmt(stats.installAmt), 'warn');
  html += row('餐饮外消费', fmt(stats.nonDiningExpenses));
  if(isCur){
    html += row(`餐饮预算（截至${todayDay}日/${daysInMonth}日）`, fmt(stats.diningBudgetToday), 'success');
  } else {
    html += row('全月餐饮预算', fmt(stats.totalDiningBudget), 'success');
  }
  html += row('实际餐饮消费', fmt(stats.diningExpenses), stats.isDiningOver?'danger':'');
  html += row(stats.isDiningOver?'餐饮超出':'餐饮节余',
    (stats.isDiningOver ? '超出 ' : '节余 ') + fmt(Math.abs(diningDiff)),
    stats.isDiningOver?'danger':'success');
  const effUsed = stats.effectiveUsed;
  html += row('实际消费 + 分期', fmt(effUsed));
  html += row(stats.isTotalOver?'总预算超出':'总预算节余',
    (stats.isTotalOver ? '超出 ' : '节余 ') + fmt(Math.abs(stats.totalOverAmount)),
    stats.isTotalOver?'danger':'success');
  if(isCur && stats.remainingDays > 0){
    html += row(`剩余${stats.remainingDays}天餐饮日均`,
      fmt(stats.remainingDiningBudget / stats.remainingDays),
      stats.remainingDiningBudget < 0 ? 'danger' : '');
  }
  content.innerHTML = html;
}

function refreshEditCat2(origCat2){

  fillCat2Select('ed-cat2', cat1, origCat2);
}

function startEdit(id){
  if(editingId && editingId!==id){ toast('请先完成当前编辑'); return; }
  editOrig = bills.find(b=>b.id===id);
  editingId = id;
  renderDetails();
}

function cancelEdit(){
  editingId = null; editOrig = null;
  renderDetails();
}

function trySaveEdit(id){
  const cat1   = document.getElementById('ed-cat1').value;
  const cat2   = document.getElementById('ed-cat2').value;
  const amount = parseFloat(document.getElementById('ed-amt').value);
  const notes  = document.getElementById('ed-notes').value.trim();
  if(isNaN(amount)||amount<=0){ toast('请输入有效金额'); return; }
  const orig = editOrig;
  const changes = [];
  const origCat = orig.category2?`${orig.category1}/${orig.category2}`:orig.category1;
  const newCat  = cat2?`${cat1}/${cat2}`:cat1;
  if(origCat !== newCat) changes.push(`分类：<strong>${esc(origCat)}</strong> → <strong>${esc(newCat)}</strong>`);
  if(parseFloat(amount)!==parseFloat(orig.amount)) changes.push(`金额：<strong>${fmt(orig.amount)}</strong> → <strong>${fmt(amount)}</strong>`);
  const on=orig.notes||'', nn=notes||'';
  if(on!==nn) changes.push(`备注：<strong>${esc(on)||'(无)'}</strong> → <strong>${esc(nn)||'(无)'}</strong>`);
  if(changes.length===0){ toast('没有修改内容'); cancelEdit(); return; }
  pendingEdit = {id, cat1, cat2:cat2||null, amount, notes:notes||null};
  document.getElementById('modal-edit-body').innerHTML =
    `<p style="margin-bottom:10px;font-weight:700">本次修改的内容：</p>` +
    changes.map(c=>`<div class="change-row">• ${c}</div>`).join('') +
    `<p style="margin-top:12px;color:var(--text3);font-size:13px">确认保存以上修改？</p>`;
  showModal('modal-edit');
}

async function doConfirmEdit(){
  closeModal('modal-edit');
  if(!pendingEdit) return;
  const {id,cat1,cat2,amount,notes} = pendingEdit;
  try{
    await updateBill(id,{category1:cat1,category2:cat2,amount,notes});
    editingId=null; editOrig=null; pendingEdit=null;
    renderDetails();
    toast('✅ 修改已保存');
  } catch(e){ toast('保存失败'); }
}

function startDel(id){
  const bill = bills.find(b=>b.id===id);
  if(!bill) return;
  deletingId = id;
  const cat = bill.category2?`${bill.category1}/${bill.category2}`:bill.category1;
  document.getElementById('modal-del-body').innerHTML =
    `<p>确认删除以下记录？</p><br>
     <p><strong>${esc(cat)}</strong>　${fmt(bill.amount)}</p>
     ${bill.notes?`<p style="color:var(--text3);font-size:13px;margin-top:4px">${esc(bill.notes)}</p>`:''}
     <p style="color:var(--danger);font-size:13px;margin-top:12px;font-weight:700">⚠️ 此操作不可撤销</p>`;
  showModal('modal-del');
}

async function doDelete(){
  closeModal('modal-del');
  if(!deletingId) return;
  try{
    await deleteBill(deletingId);
    deletingId=null;
    if(editingId){ editingId=null; editOrig=null; }
    renderDetails(); toast('已删除');
  } catch(e){ toast('删除失败'); }
}

function renderCredit(){
  if(ccConfig){
    document.getElementById('cc-monthly').value = ccConfig.monthly_amount||'';
    document.getElementById('cc-remain').value  = ccConfig.remaining_months||'';
    const now = new Date();
    const day = now.getDate();
    const infoEl = document.getElementById('cc-info');
    if(ccConfig.remaining_months>0 && ccConfig.monthly_amount>0){
      let nextBillDate;
      if(day<18){
        nextBillDate = `${now.getFullYear()}年${now.getMonth()+1}月18日`;
      } else {
        const nm = new Date(now.getFullYear(), now.getMonth()+1, 18);
        nextBillDate = `${nm.getFullYear()}年${nm.getMonth()+1}月18日`;
      }
      infoEl.textContent = `📅 下次出账：${nextBillDate}　每月 ${fmt(ccConfig.monthly_amount)}　剩余 ${ccConfig.remaining_months} 期`;
    } else {
      infoEl.textContent = '暂未设置分期';
    }
  }
  updateCc2();
  renderPending();
}

function updateCc2(){

}

  document.getElementById('cc-total').textContent = fmt(total);

  const el = document.getElementById('cc-pending');
  el.innerHTML = '';
  if(pending.length===0){
    el.innerHTML = '<div class="empty" style="padding:20px 0"><div class="empty-icon">✨</div><p>暂无待还款项目</p></div>';
    return;
  }
  pending.forEach(b=>{
    const cat = b.category2?`${b.category1} / ${esc(b.category2)}`:b.category1;

      </div>

      <button class="btn btn-danger btn-xs" onclick="delPending('${b.id}')">删除</button>`;

}

function showPayConfirm(){
  const pending = bills.filter(b=>b.status==='credit_pending');
  if(pending.length===0){ toast('暂无待还款项目'); return; }
  const total = pending.reduce((s,b)=>s+parseFloat(b.amount),0);
  const insts  = pending.filter(b=>b.category2==='信用卡分期');
  const extras = pending.filter(b=>b.category2!=='信用卡分期');
  const instTotal  = insts.reduce((s,b)=>s+parseFloat(b.amount),0);
  const extraTotal = extras.reduce((s,b)=>s+parseFloat(b.amount),0);
  let html = `<p>所有待还款项目将以 <strong>${todayStr()}</strong> 为日期记入详情。</p><br>`;
  if(insts.length>0)  html+=`<p>🔄 分期还款：<strong>${fmt(instTotal)}</strong></p>`;
  if(extras.length>0) html+=`<p>➕ 额外消费：<strong>${extras.length} 笔，共 ${fmt(extraTotal)}</strong></p>`;
  html += `<br><p style="font-size:16px">合计：<strong>${fmt(total)}</strong></p>`;
  document.getElementById('modal-pay-body').innerHTML = html;
  showModal('modal-pay');
}

async function doPayment(){
  closeModal('modal-pay');
  const pending = bills.filter(b=>b.status==='credit_pending');
  const todayS  = todayStr();
  const hasInst = pending.some(b=>b.category2==='信用卡分期');
  try{
    const ids = pending.map(b=>b.id);
    const {error} = await db.from('bills').update({status:'regular', date:todayS}).in('id',ids);
    if(error) throw error;
    if(hasInst && ccConfig && ccConfig.remaining_months>0){
      const nr = ccConfig.remaining_months-1;
      await db.from('credit_config').update({remaining_months:nr}).eq('id',ccConfig.id);
      ccConfig.remaining_months = nr;
    }
    await loadBills();
    renderCredit();
    if(curTab==='balance') renderBalance();
    toast('✅ 还款成功！账单已记入详情');
  } catch(e){ toast('还款失败：'+e.message); }
}

const BANK_MAP = [
  {keys:['中行','中国银行'],  char:'中', bg:'#e53935'},
  {keys:['农行','农业银行'],  char:'农', bg:'#43a047'},

  {keys:['工行','工商银行'],  char:'工', bg:'#ec407a'},
];

function getBankIconHtml(name){
  const match = BANK_MAP.find(m=>m.keys.some(k=>name.includes(k)));
  if(match) return `<div class="bank-badge" style="background:${match.bg}">${match.char}</div>`;
  return `<div class="bal-icon" style="background:#fffbe6">🏦</div>`;
}

function getBalIconHtml(b){
  if(b.type==='wechat') return `<div class="bal-icon" style="background:#f0fff4">💚</div>`;
  if(b.type==='alipay') return `<div class="bal-icon" style="background:#f0f8ff">💙</div>`;
  return getBankIconHtml(b.name);
}

// Estimated remaining = calibrated total - all regular bills after calibration effective date
function calcEstimatedRemaining(){
  const from = getCalibEffectiveFrom();
  if(!from) return null;
  const calibTotal = balances.reduce((s,b)=>s+parseFloat(b.amount),0);
  const spent = bills.filter(b=>b.status==='regular' && b.date>=from)
    .reduce((s,b)=>s+parseFloat(b.amount),0);
  return calibTotal - spent;
}

    div.className = 'calib-row';
    div.innerHTML = `
      <span class="calib-name">${b.type==='wechat'?'💚':b.type==='alipay'?'💙':'🏦'} ${esc(b.name)}</span>
      <input type="number" class="calib-inp" id="calib-${b.id}" placeholder="0.00"
        value="${parseFloat(b.amount).toFixed(2)}" inputmode="decimal" step="0.01"
        oninput="updateCalibPreview()">`;
    el.appendChild(div);
  });
  updateCalibPreview();
}

function updateCalibPreview(){
  const previewEl = document.getElementById('calib-preview');
  if(!previewEl) return;
  const predicted = calcEstimatedRemaining();
  let newTotal = 0;
  let valid = true;
  balances.forEach(b=>{
    const inp = document.getElementById('calib-'+b.id);
    if(!inp){ valid=false; return; }
    const v = parseFloat(inp.value);
    if(isNaN(v)){ valid=false; return; }
    newTotal += v;
  });
  if(!valid || predicted === null){ previewEl.style.display='none'; return; }
  const diff = newTotal - predicted;
  const absDiff = Math.abs(diff);
  const diffColor = Math.abs(diff) < 0.01 ? 'var(--success)' : diff > 0 ? 'var(--primary)' : 'var(--danger)';
  const diffText  = Math.abs(diff) < 0.01 ? '✅ 和预计完全一致' :
    diff > 0 ? `比预计多 ${fmt(absDiff)}` : `比预计少 ${fmt(absDiff)}`;
  previewEl.style.display = 'block';
  previewEl.innerHTML = `
    <div style="background:var(--bg);border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.8">
      <div style="display:flex;justify-content:space-between">
        <span style="color:var(--text3)">预计剩余</span><strong>${fmt(predicted)}</strong>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span style="color:var(--text3)">本次校准总额</span><strong>${fmt(newTotal)}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;border-top:1px solid var(--border);margin-top:4px;padding-top:4px">
        <span style="color:var(--text3)">偏差</span>
        <strong style="color:${diffColor}">${diffText}</strong>
      </div>
    </div>`;
}

async function doCalibration(){
  const snaps = balances.map(b=>{
    const inp = document.getElementById('calib-'+b.id);
    const after = inp ? parseFloat(inp.value)||0 : parseFloat(b.amount);
    return {id:b.id, name:b.name, before:parseFloat(b.amount), after};
  });
  const changed = snaps.filter(s=>s.before!==s.after);
  if(changed.length===0){ toast('余额无变化，无需校准'); return; }
  try{
    for(const s of snaps){
      await db.from('balances').update({amount:s.after}).eq('id',s.id);
      const bal = balances.find(b=>b.id===s.id);
      if(bal) bal.amount = s.after;
    }
    const {data,error} = await db.from('calibrations').insert({
      calibration_date: todayStr(),
      snapshots: JSON.stringify(snaps)
    }).select().single();
    if(!error && data) calibrations.unshift(data);
    renderBalance();
    toast('✅ 校准完成');
  } catch(e){ toast('校准失败：'+e.message); }
}

function renderCalibRecords(){
  const el = document.getElementById('calib-records');
  if(calibrations.length===0){
    el.innerHTML='<div style="font-size:13px;color:var(--text3);padding:8px 0">暂无校准记录</div>';
    return;
  }
  el.innerHTML='';
  calibrations.forEach((c, idx)=>{
    let snaps = [];
    try{ snaps = JSON.parse(c.snapshots); } catch(e){}
    const utcMs  = new Date(c.created_at).getTime();
    const bjDate = new Date(utcMs + 8*60*60*1000);
    const bjH    = bjDate.getUTCHours();
    const bjM    = bjDate.getUTCMinutes();
    const bjTimeStr  = `${String(bjH).padStart(2,'0')}:${String(bjM).padStart(2,'0')}`;
    // 从 created_at 反推北京日期（而非 calibration_date，因为后者可能是 UTC 日期）
    const bjDateStr  = bjDate.toISOString().split('T')[0];
    let effectiveFrom;
    if(bjH < 8){
      effectiveFrom = bjDateStr;
    } else {
      const next = new Date(bjDate.getTime() + 24*60*60*1000);
      effectiveFrom = next.toISOString().split('T')[0];
    }
    const isLatest = idx === 0;
    const effLabel = isLatest
      ? `<span style="color:var(--primary);font-weight:700">${effectiveFrom} 起生效中</span>`
      : `<span style="color:var(--text3)">${effectiveFrom} 起（已被覆盖）</span>`;
    const div = document.createElement('div');
    div.className = 'calib-rec';
    div.innerHTML = `
      <div class="calib-rec-hd" onclick="toggleCalibRec('${c.id}')">
        <span class="calib-rec-date">📅 ${bjDateStr} <span style="font-size:12px;color:var(--text3);font-weight:600">北京时间 ${bjTimeStr}</span></span>
        <span class="calib-toggle" id="ctog-${c.id}">展开</span>
      </div>
      <div class="calib-rec-body" id="cbody-${c.id}">
        <div style="font-size:12px;margin-bottom:8px;padding:5px 8px;background:var(--bg);border-radius:7px">${effLabel}</div>
        ${snaps.map(s=>`
          <div class="calib-snap">
            <span class="calib-snap-lbl">${esc(s.name)}</span>
            <span class="calib-snap-val">${fmt(s.before)} → <strong>${fmt(s.after)}</strong></span>
          </div>`).join('')}
        <div class="calib-rec-del">
          <button class="btn btn-danger btn-xs" onclick="doDelCalibRec('${c.id}')">删除此记录</button>
        </div>
      </div>`;
    el.appendChild(div);
  });
}

function toggleCalibRec(id){
  const body = document.getElementById('cbody-'+id);
  const tog  = document.getElementById('ctog-'+id);
  const open = body.classList.toggle('open');
  tog.textContent = open ? '收起' : '展开';
}

async function doDelCalibRec(id){
  const {error} = await db.from('calibrations').delete().eq('id',id);
  if(error){ toast('删除失败'); return; }
  calibrations = calibrations.filter(c=>c.id!==id);
  renderCalibRecords();
  toast('已删除校准记录');
}

// ════════════════════════════════════════
//  REALTIME
// ════════════════════════════════════════
function setupRealtime(){
  db.channel('app-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'bills'}, async()=>{
      await loadBills();
      rerender();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'categories'}, async()=>{
      await loadCats();
      updateE2(); updateMgmt(); updateCc2();
    })
    .subscribe();
}

function rerender(){
  if(curTab==='overview') renderOverview();
  if(curTab==='details')  renderDetails();
  if(curTab==='credit')   renderCredit();
  if(curTab==='balance')  renderBalance();
}

// ════════════════════════════════════════
//  BOOTSTRAP
// ════════════════════════════════════════
async function init(){
  // Load Supabase config from config.json
  try{
    const cfg = await fetch('./config.json').then(r=>r.json());
    db = createClient(cfg.SUPABASE_URL, cfg.SUPABASE_KEY);
  } catch(e){
    document.getElementById('loading-screen').innerHTML =
      '<div style="padding:30px;text-align:center;color:#ff6b6b;font-weight:800;font-size:15px">⚠️ 无法读取 config.json<br><span style="font-size:13px;color:#a8b3c8;font-weight:600">请确认同目录下存在 config.json 并填写了 Supabase 信息</span></div>';
    return;
  }
  try{
    await loadAll();
    await checkMonthlyReset();
    await checkAutoInstallment();
    setupRealtime();
  } catch(e){ console.error('Init error:',e); }
  finally{ document.getElementById('loading-screen').style.display='none'; }

  ovDate = new Date();
  detMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
  detFilter = {cat1:'', cat2:''};
  setPeriod('month');
  renderOverview();
}

// Close modals on backdrop click (not edit modal to preserve user input)
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click', e=>{
    if(e.target===el && el.id!=='modal-edit') el.classList.remove('show');
  });
});

window.addEventListener('DOMContentLoaded', init);
</script>
